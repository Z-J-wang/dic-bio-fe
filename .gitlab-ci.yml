stages:
  - lint

lint-check:
  stage: lint

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'

  image: node:22.21.1-alpine  # 设定流水线运行版本

  # 基于commit sha创建缓存
  cache:
    key: ${CI_COMMIT_REF_SLUG}-${{ checksum "pnpm-lock.yaml" }}  # 分支名 + 锁文件哈希
    paths:
      - node_modules/
      - .cache/
    # 修改缓存策略，确保在作业开始时加载缓存，结束时保存缓存
    policy: pull-push

  before_script:
    - echo "Starting lint check job"
    # 添加时区设置和基础环境检查
    - echo "Running on branch：$CI_COMMIT_BRANCH"

  script:
    # 添加错误处理和更详细的输出
    - npm install -g pnpm
    - pnpm install --frozen-lockfile || { echo "pnpm install failed"; exit 1; }
    - pnpm lint || { echo "lint failed"; exit 1; }
    # - pnpm type-check || { echo "type-check failed"; exit 1; }

  after_script:
    - echo "Lint check completed"
    # 添加作业状态输出
    - echo "Job finished with status：$CI_JOB_STATUS"

  # 添加作业超时设置
  timeout: 10 minutes

  # 添加retry策略以提高稳定性
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
