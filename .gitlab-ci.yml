stages:
  - lint  # 单一lint阶段，专注代码检查

lint-check:
  stage: lint
  image: node:22.1.0-alpine  # 固定版本+轻量镜像
  cache:
    key: ${CI_COMMIT_SHA}
    paths:
      - node_modules/
      - .cache/
    policy: pull-push
    when: on_success

  before_script:
    - echo "Starting lint check job"
  script:
    - yarn install --frozen-lockfile
    - yarn lint
    - yarn type-check

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
  allow_failure: false
  after_script:
    - echo "Lint check completed"
