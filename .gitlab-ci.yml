stages:
  - lint  # 单一lint阶段，专注代码检查
  
lint-check:
  stage: lint
  image: node:22.1.0-alpine  # 固定版本+轻量镜像
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .cache/
    policy: pull-push
    when: on_success
  script:
    - yarn install --frozen-lockfile
    - yarn lint
    - yarn type-check
#   artifacts:
#     paths:
#       - lint-report.log  # 上传检查报告
  rules:                # 替换only
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  allow_failure: false
  timeout: 20m          # 延长超时
  tags:
    - docker-cached
